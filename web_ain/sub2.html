<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/sub2.css">
</head>
<body>
<section>
    <h1><a href="#"><img src="img/logo.png" alt="로고"></a></h1>
    <div id="bigbox">
     <div class="subbox">
        <h2>로그인 | 회원가입</h2>
        <input type="text" placeholder="아이디" name="id">
        <input type="password" placeholder="비밀번호" name="pwd">
        <button class="login">로그인</button>

        <div class="findbtn">
            <button class="id">아이디</button>
            <button class="pwd">비밀번호 찾기</button>
        </div>
        <div class="txt">
        <p>아직 회원이 아니신가요?<br>
        위즈덤하우스의 회원이 되시면 다양한 도서 정보와 이벤트 등의 혜택을 받아보실 수 있습니다.
        </p>
        <button class="join">회원가입 하러가기 ></button>
        </div>
        <h4 class="or">또는</h4>
        <h4 class="or2">네이버/카카오로 간편이용</h4>
        <div class="sns">
            <ul>
                <li><a href="#"><img src="img/sns_nv.png" alt="네이버로그인"></a></li>
                <li><a href="#"><img src="img/sns_kko.png" alt="카카오로그인"></a></li>
            </ul>
        </div>
     </div>
    </div>
    <div class="info_box">
    <p class="info">위즈덤하우스는 회원의 개인정보 보호 문제를 신중하게 보호하려고 노력하고 있습니다.<br>
    가입하신 정보는 회원님의 동의 없이 공개되지 않으며, 개인정보취급방침에 의해 보호받습니다. </p>
    </div>
</section>
</body>
</html>
