<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/member.css">
    <script src="js/js.js"></script>
</head>
<body>
<form action="ab.php"  method="post" name="member" onsubmit="return form()">
<header id="join_mem">
<div class="logo"><a href="#"><img src="img/wlogo.png" alt="logo"></a></div>

<fieldset id="mem">
<legend>회원가입</legend>
<div class="group">
<ul>
<li><label for="id" >아이디</label>
<input type="text" name="id" id="id" size="30" placeholder="6글자 이상 입력하세요." >
<button class="id2">중복확인</button>
</li>

<li><label for="pwd1">비밀번호</label>
<input type="password" name="pwd1" id="pwd1" minlength="8" maxlength="20" size="30" placeholder="8~20자 이내의 비밀번호를 입력하세요."></li>
<li><label for="pwd2">비밀번호 재확인</label>
<input type="password" name="pwd2" id="pwd2" minlength="8" maxlength="20" size="30" ></li>

<li><label for="name">이름</label> 
<input type="text" name="name" id="name" maxlength="10" size="30" ></li>

<li><label for="ph">휴대폰</label>
<input type="tel" name="phone" id="ph" maxlength="12" size="30"  pattern="[0-9]{10,11}" placeholder="(-)를 제외하고 입력하세요."></li>
<li><p class="receive">정보이용 수신동의
<input type="radio" value="y" name="receive">예
<input type="radio" value="n" name="receive">아니오
</p></li>
<li><label for="email" >이메일</label>
<input type="email" name="email" id="email" maxlength="30" size="40"  placeholder="@naver.com"></li>
<li><p class="receive">정보이용 수신동의
<input type="radio" value="y" name="receive">예
<input type="radio" value="n" name="receive">아니오
</p></li>
<li><label for="address">주소</label>
<input type="text" name="adress" id="address" maxlength="12" size="40">
</ul>
<div id="button">
<input type="submit" value="가입하기" class="submit">
<input type="reset" value="돌아가기" class="reset"></div>
</div>
</fieldset>
</header>
</form>
</body>
</html>
